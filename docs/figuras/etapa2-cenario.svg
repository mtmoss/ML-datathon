<svg viewBox="0 0 350 470" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <rect x="0" y="0" width="350" height="470" fill="#FFFFFF"/>
  <text x="175" y="20" text-anchor="middle" fill="#48494D" font-size="13" font-weight="bold">ETAPA 2 — CENÁRIO SINTÉTICO</text>

  <!-- contexto real -->
  <rect x="40" y="32" width="270" height="50" rx="4" fill="#00ACF1"/>
  <text x="175" y="51" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">CLIENTE REAL = contexto</text>
  <text x="175" y="67" text-anchor="middle" fill="#FFFFFF" font-size="9">segmento · canal · propensão (p0)</text>

  <text x="175" y="98" text-anchor="middle" fill="#48494D" font-size="10">▼  4 ofertas (braços) competem</text>

  <!-- bracos -->
  <rect x="10" y="106" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#48494D" stroke-width="1.3"/>
  <text x="90" y="127" text-anchor="middle" fill="#48494D" font-size="9">sem_oferta · educacao</text>
  <rect x="180" y="106" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#48494D" stroke-width="1.3"/>
  <text x="260" y="127" text-anchor="middle" fill="#48494D" font-size="9">simulador · oferta_dep.</text>

  <text x="175" y="160" text-anchor="middle" fill="#48494D" font-size="10">▼  política de log sorteia 1 (uniforme)</text>

  <!-- melhor braco por segmento -->
  <rect x="10" y="170" width="330" height="78" rx="4" fill="#EE008B"/>
  <text x="175" y="188" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">O MELHOR BRAÇO DEPENDE DO CONTEXTO</text>
  <text x="20" y="206" fill="#FFFFFF" font-size="9">novo            →  educacao_financeira</text>
  <text x="20" y="222" fill="#FFFFFF" font-size="9">recorrente      →  simulador_credito</text>
  <text x="20" y="238" fill="#FFFFFF" font-size="9">reativado       →  oferta_deposito</text>

  <text x="175" y="268" text-anchor="middle" fill="#48494D" font-size="10">▼  recompensa vem em funil (com atraso)</text>

  <!-- funil -->
  <rect x="30" y="278" width="290" height="30" rx="4" fill="#48494D"/>
  <text x="175" y="297" text-anchor="middle" fill="#FFFFFF" font-size="9">CLIQUE   valor 0.1   ·   ~1.5 h</text>
  <rect x="55" y="312" width="240" height="30" rx="4" fill="#48494D"/>
  <text x="175" y="331" text-anchor="middle" fill="#FFFFFF" font-size="9">JORNADA   valor 0.3   ·   ~12 h</text>
  <rect x="80" y="346" width="190" height="30" rx="4" fill="#FFF300"/>
  <text x="175" y="365" text-anchor="middle" fill="#48494D" font-size="9" font-weight="bold">CONVERSÃO  1.0  ·  ~7,5 dias</text>

  <!-- saida -->
  <line x1="20" y1="392" x2="330" y2="392" stroke="#48494D" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="175" y="410" text-anchor="middle" fill="#48494D" font-size="10" font-weight="bold">3 arquivos + relatório + testes</text>
  <text x="175" y="428" text-anchor="middle" fill="#48494D" font-size="9">catálogo · 8.000 eventos · 5.121 recompensas</text>
  <text x="175" y="446" text-anchor="middle" fill="#48494D" font-size="9">semente fixa = reprodutível</text>
  <text x="175" y="462" text-anchor="middle" fill="#48494D" font-size="9">separado da base Kaggle original</text>
</svg>
