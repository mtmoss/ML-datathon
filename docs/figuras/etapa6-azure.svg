<svg viewBox="0 0 360 500" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <rect x="0" y="0" width="360" height="500" fill="#FFFFFF"/>
  <text x="180" y="20" text-anchor="middle" fill="#48494D" font-size="13" font-weight="bold">ETAPA 6 — ARQUITETURA AZURE</text>
  <text x="180" y="35" text-anchor="middle" fill="#48494D" font-size="9">só Azure · serviços gerenciados · barato ocioso</text>

  <!-- seguranca (faixa) -->
  <rect x="10" y="44" width="340" height="34" rx="4" fill="#48494D"/>
  <text x="180" y="60" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold">SEGURANÇA / IDENTIDADE</text>
  <text x="180" y="73" text-anchor="middle" fill="#FFF300" font-size="8">Entra ID · Managed Identity · Key Vault · RBAC · Policy</text>

  <!-- entrada -->
  <rect x="90" y="86" width="180" height="30" rx="4" fill="#00ACF1"/>
  <text x="180" y="105" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold">API Management (entrada)</text>
  <text x="180" y="124" text-anchor="middle" fill="#48494D" font-size="10">▼</text>

  <!-- compute -->
  <rect x="20" y="130" width="155" height="40" rx="4" fill="#EE008B"/>
  <text x="97" y="147" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold">Container Apps</text>
  <text x="97" y="160" text-anchor="middle" fill="#FFFFFF" font-size="8">API de decisão (FastAPI)</text>
  <rect x="185" y="130" width="155" height="40" rx="4" fill="#EE008B"/>
  <text x="262" y="147" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold">Container Apps Job</text>
  <text x="262" y="160" text-anchor="middle" fill="#FFFFFF" font-size="8">retreino (Etapa 7)</text>

  <text x="180" y="184" text-anchor="middle" fill="#48494D" font-size="10">▼</text>

  <!-- dados / eventos -->
  <rect x="10" y="190" width="108" height="40" rx="4" fill="#00ACF1"/>
  <text x="64" y="207" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold">Blob / Data Lake</text>
  <text x="64" y="220" text-anchor="middle" fill="#FFFFFF" font-size="7">dados · artefatos · log</text>
  <rect x="126" y="190" width="108" height="40" rx="4" fill="#00ACF1"/>
  <text x="180" y="207" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold">PostgreSQL</text>
  <text x="180" y="220" text-anchor="middle" fill="#FFFFFF" font-size="7">backend MLflow</text>
  <rect x="242" y="190" width="108" height="40" rx="4" fill="#00ACF1"/>
  <text x="296" y="207" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold">Event Hubs</text>
  <text x="296" y="220" text-anchor="middle" fill="#FFFFFF" font-size="7">impressões/recompensas</text>

  <!-- mlops -->
  <rect x="60" y="244" width="240" height="32" rx="4" fill="#9aa0a6"/>
  <text x="180" y="264" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold">MLflow — tracking + model registry</text>

  <text x="180" y="290" text-anchor="middle" fill="#48494D" font-size="9" font-weight="bold">— assistente LLM (RAG) —</text>

  <!-- ia/rag -->
  <rect x="20" y="298" width="155" height="40" rx="4" fill="#FFF300"/>
  <text x="97" y="315" text-anchor="middle" fill="#48494D" font-size="9" font-weight="bold">Azure AI Search</text>
  <text x="97" y="328" text-anchor="middle" fill="#48494D" font-size="8">busca vetorial (RAG)</text>
  <rect x="185" y="298" width="155" height="40" rx="4" fill="#FFF300"/>
  <text x="262" y="315" text-anchor="middle" fill="#48494D" font-size="9" font-weight="bold">Azure AI Foundry</text>
  <text x="262" y="328" text-anchor="middle" fill="#48494D" font-size="8">modelo de chat + embed</text>

  <!-- observabilidade -->
  <rect x="10" y="352" width="340" height="30" rx="4" fill="#48494D"/>
  <text x="180" y="368" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold">OBSERVABILIDADE</text>
  <text x="180" y="379" text-anchor="middle" fill="#FFF300" font-size="8">Azure Monitor · Application Insights · Log Analytics</text>

  <!-- nota custo -->
  <line x1="10" y1="396" x2="350" y2="396" stroke="#48494D" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="180" y="412" text-anchor="middle" fill="#48494D" font-size="9" font-weight="bold">custo: o que paga mesmo ocioso</text>
  <text x="20" y="428" fill="#48494D" font-size="8">Container Apps → escala a ZERO (quase nada parado)</text>
  <text x="20" y="442" fill="#48494D" font-size="8">PostgreSQL e AI Search → cobram mesmo parados</text>
  <text x="20" y="456" fill="#48494D" font-size="8">AI Foundry → paga por token (só quando usa)</text>
  <text x="20" y="470" fill="#48494D" font-size="8">alta carga: Container Apps e Event Hubs escalam sozinhos</text>
  <text x="180" y="488" text-anchor="middle" fill="#48494D" font-size="8">desenho-alvo · sem deploy real · plano em infra/azure</text>
</svg>
